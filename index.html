<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARENA SUD · Liga Čovječe ne ljuti se</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">
  <style>
    *{box-sizing:border-box;margin:0;padding:0} body{min-height:100vh;background:#050309;color:#f7ead1;font-family:Orbitron,system-ui,sans-serif;overflow-x:hidden} body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 18% 18%,rgba(185,42,255,.26),transparent 28%),radial-gradient(circle at 82% 26%,rgba(0,210,255,.18),transparent 24%),linear-gradient(180deg,#07030c 0%,#120814 48%,#050309 100%);z-index:-3} body:after{content:"";position:fixed;left:0;right:0;top:35vh;height:30vh;background:linear-gradient(180deg,rgba(49,22,12,.2),rgba(9,4,7,.92)),repeating-linear-gradient(90deg,rgba(255,194,91,.18) 0 2px,transparent 2px 80px);border-top:1px solid rgba(255,194,91,.25);border-bottom:1px solid rgba(255,194,91,.18);z-index:-2;box-shadow:0 0 60px rgba(0,0,0,.8)} .page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:38px 18px;text-align:center;position:relative}.portraits{display:grid;grid-template-columns:repeat(4,minmax(72px,150px));gap:12px;width:min(760px,92vw);padding:12px;border:1px solid rgba(255,194,91,.18);background:rgba(0,0,0,.36);box-shadow:0 0 35px rgba(185,42,255,.18)}.portrait{height:150px;border:1px solid rgba(255,255,255,.16);position:relative;overflow:hidden}.portrait:before{content:"";position:absolute;inset:18px 22px;background:radial-gradient(circle at 52% 22%,rgba(0,0,0,.92) 0 22px,transparent 23px),linear-gradient(170deg,transparent 0 37%,rgba(0,0,0,.9) 38% 78%,transparent 79%);filter:blur(.2px)}.portrait:nth-child(1){background:linear-gradient(135deg,#ff0f8a,#3a001d)}.portrait:nth-child(2){background:linear-gradient(135deg,#00a7ff,#001d42)}.portrait:nth-child(3){background:linear-gradient(135deg,#46ff63,#0c2c13)}.portrait:nth-child(4){background:linear-gradient(135deg,#ffb12a,#371500)}.brand{display:flex;align-items:center;gap:18px;justify-content:center;flex-wrap:wrap}.brand img{width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(255,194,91,.55))}.title h1{font-size:clamp(2.8rem,8vw,6rem);letter-spacing:4px;color:#ffd681;text-shadow:0 0 22px rgba(255,194,91,.55),0 4px 0 #2a1108}.title p{font-family:'Share Tech Mono',monospace;font-size:clamp(1.1rem,3vw,1.8rem);color:#f044ff;text-shadow:0 0 16px rgba(240,68,255,.6)}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;width:min(820px,92vw)}.card{background:rgba(8,8,13,.72);border:1px solid rgba(255,194,91,.22);border-radius:16px;padding:18px;box-shadow:0 12px 35px rgba(0,0,0,.45)}.card b{display:block;color:#ffd681;margin-bottom:6px}.card span{font-family:'Share Tech Mono',monospace;color:#b7a58c}.enter{margin-top:4px;display:inline-flex;align-items:center;gap:14px;padding:18px 42px;border-radius:14px;background:linear-gradient(135deg,#ffd681,#a87020);color:#120707;text-decoration:none;font-weight:900;letter-spacing:2px;box-shadow:0 0 28px rgba(255,194,91,.45),0 8px 0 #3c1b08}.enter:hover{transform:translateY(-2px)}footer{padding:20px;color:#6e5a45;font-family:'Share Tech Mono',monospace}@media(max-width:520px){.portraits{grid-template-columns:repeat(2,1fr)}.portrait{height:120px}.brand img{width:82px;height:82px}}
  </style>
</head>
<body>
  <main class="page">
    <div class="brand"><img src="logo.png" alt="ONK-BAK logo"><div class="title"><h1>ARENA SUD</h1><p>Liga Čovječe ne ljuti se</p></div></div>
    <div class="portraits"><div class="portrait"></div><div class="portrait"></div><div class="portrait"></div><div class="portrait"></div></div>
    <div class="cards"><div class="card"><b>🎲 Liga</b><span>Kola, partije, REZ i kazne.</span></div><div class="card"><b>🏆 Tablica</b><span>Digitalni ekran arene.</span></div><div class="card"><b>🍸 Lounge</b><span>Bar, neon i privatna soba.</span></div><div class="card"><b>🪰 Muhe</b><span>Svaka figura se broji.</span></div></div>
    <a class="enter" href="app.html">ULAZ U ARENU</a>
  </main>
  <footer>ARENA SUD · ONK-BAK logo · Čovječe ne ljuti se</footer>
</body>
</html>
